<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behaviours on Display - IBL Energy</title>
<!-- Google Fonts: Permanent Marker for titles, DM Sans for app-like text -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8eef5;
    --border: #d0dae6;
    /* Company Colors */
    --accent: #0F2C61; /* Updated Navy */
    --accent2: #FF51A1; /* Pink */
    --accent3: #00D0DA; /* Teal */
    --accent4: #0891b2; /* Kept existing value for other accents */
    /* Main text color, now uses the updated Navy */
    --text: #0F2C61; 
    --muted: #53698c; /* Adjusted muted color to complement new navy */
    --danger: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }
  
  /* Apply Permanent Marker to specified titles */
  .auth-logo, .nav-logo, .page-header h2, .stat-value, .rank { 
    font-family: 'Permanent Marker', cursive; 
    font-weight: normal; /* Permanent Marker is typically one weight */
  }
  
  /* Ensure h3, h4 and other elements use DM Sans for app-like feel */
  h1, h2, h3, h4, .btn, .nav-tab, .team-tab, .stat-label, .lb-name, .pill, .form-group label, .avatar, .success-msg, .alert,
  .user-list-item .uname, .card-type-list-item .ct-name {
    font-family: 'DM Sans', sans-serif; /* Default to DM Sans */
  }

  h1, h2 { /* Specific font for main headers - overridden for H2 above */ }
  h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  h4 { font-size: 16px; font-weight: 700; } /* Used for team grouping in Admin */
  h5 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text); } /* Used for value grouping in Admin */


  /* ── AUTH SCREEN ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #e2eaf5 0%, var(--bg) 60%);
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    overflow: hidden;
    display: flex; 
    flex-direction: column; 
    align-items: center; 
  }
  .auth-box::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(255,81,161,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .ibl-energy-main-logo {
    max-width: 180px; 
    height: auto;
    margin-bottom: 10px; 
  }
  .auth-logo {
    font-size: 28px; 
    letter-spacing: 0.5px; 
    margin-bottom: 8px;
    white-space: nowrap; /* Forces text to stay on a single line */
  }
  .auth-logo span { color: var(--accent2); }
  .auth-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; text-align: center; }
  .form-group { margin-bottom: 18px; width: 100%; } 
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif; 
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: none; border-radius: 10px; cursor: pointer;
    font-weight: 700; 
    transition: all 0.2s; text-decoration: none;
  }
  .btn-primary {
    background: var(--accent); color: #ffffff;
    padding: 13px 24px; font-size: 14px; width: 100%;
  }
  .btn-primary:hover { background: #0A1F4C; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    padding: 10px 18px; font-size: 13px;
  }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-danger { background: var(--danger); color: #fff; padding: 8px 14px; font-size: 13px; }
  .btn-danger:hover { background: #e86070; }
  .btn-sm { padding: 7px 14px; font-size: 12px; }

  /* ── APP SHELL ── */
  #app { display: none; min-height: 100vh; flex-direction: column; }

  /* ── TOP NAV ── */
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    height: 64px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { 
    font-size: 22px; 
    letter-spacing: 1px;
  }
  .nav-logo span { color: var(--accent2); }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 700;
    color: var(--muted); transition: all 0.2s;
    border: 1px solid transparent;
  }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { 
    color: var(--accent); 
    background: rgba(15,44,97,0.08); 
    border-color: rgba(15,44,97,0.2); 
  }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-user {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--muted); font-weight: 500;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    flex-shrink: 0;
  }
  .btn-logout {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); padding: 7px 14px; font-size: 12px;
    cursor: pointer; font-weight: 700;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  /* ── MAIN CONTENT ── */
  .main { flex: 1; padding: 32px; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 32px; }
  .page-header h2 { 
    font-size: 26px; 
    letter-spacing: -0.5px; 
    font-weight: normal;
  }
  .page-header p { color: var(--muted); font-size: 14px; margin-top: 6px; }

  /* ── STATS STRIP ── */
  .stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    border-radius: 0 0 14px 14px;
  }
  .stat-card.c1::after { background: var(--accent); }
  .stat-card.c2::after { background: var(--accent2); }
  .stat-card.c3::after { background: var(--accent3); }
  .stat-card.c4::after { background: var(--accent4); }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); font-weight: 700; margin-bottom: 8px; }
  .stat-value { font-size: 38px; line-height: 1; } 
  .stat-card.c1 .stat-value { color: var(--accent); }
  .stat-card.c2 .stat-value { color: var(--accent2); }
  .stat-card.c3 .stat-value { color: var(--accent3); }
  .stat-card.c4 .stat-value { color: var(--accent4); }

  /* ── TEAM TABS ── */
  .team-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .team-tab {
    padding: 10px 18px; border-radius: 10px; cursor: pointer;
    font-size: 13px; font-weight: 700;
    color: var(--muted); background: var(--surface); border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .team-tab:hover { color: var(--text); border-color: var(--accent); }
  .team-tab.active { color: #ffffff; background: var(--accent); border-color: var(--accent); }

  /* ── LEADERBOARD ── */
  .leaderboard { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .lb-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .lb-header h3 { margin-bottom: 0; font-family: 'DM Sans', sans-serif; } 
  .lb-row {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: var(--surface2); }
  .lb-row.me { background: rgba(15,44,97,0.05); }
  .rank {
    font-size: 20px;
    width: 32px; text-align: center; color: var(--muted);
  }
  .rank.gold { color: var(--accent); }
  .rank.silver { color: #9ca3af; }
  .rank.bronze { color: var(--accent2); }
  .lb-name { flex: 1; font-weight: 700; color: var(--text); }
  .lb-name small { display: block; font-size: 12px; color: var(--muted); font-weight: 500; font-family: 'DM Sans', sans-serif; }
  .lb-cards { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .pill {
    font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
  }
  .pill.pioneer { background: rgba(15,44,97,0.1); color: var(--accent); }
  .pill.purposeful { background: rgba(255,81,161,0.12); color: var(--accent2); }
  .pill.excellence { background: rgba(0,208,218,0.12); color: var(--accent3); }
  .pill.reliable { background: rgba(5,150,105,0.12); color: #059669; }
  .pill.sustainable { background: rgba(234,88,12,0.12); color: #ea580c; }
  .pill.gold-card { background: rgba(217,119,6,0.15); color: #b45309; } 
  .pill.gold-behavior { background: rgba(15,44,97,0.15); color: var(--text); border: 1px solid var(--accent); } 

  .pill.count { background: var(--surface2); color: var(--text); border: 1px solid var(--border); font-size: 12px; min-width: 28px; text-align: center; }

  /* ── CARDS FEED ── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; } /* Adjusted minmax for card sizing */

  /* Card Flip styles */
  .card-item {
    background-color: transparent; /* Changed from var(--surface) for flip effect */
    width: 100%;
    height: 200px; /* Fixed height for consistency */
    perspective: 1000px; /* 3D effect */
    cursor: pointer;
    border-radius: 14px;
    /* overflow: hidden; /* This can clip content if not handled carefully, using it on inner */
    position: relative; /* Needed for absolute positioning of overlay */
  }

  .card-item-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
    border-radius: 14px;
  }

  .card-item.flipped .card-item-inner {
    transform: rotateY(180deg);
  }

  .card-item-front, .card-item-back {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden; /* Safari */
    backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 15px;
    background-color: var(--surface);
    border: 1px solid var(--border);
  }

  .card-item-front {
    background-color: var(--surface);
    color: var(--text);
  }

  .card-item-back {
    background-color: var(--surface2);
    color: var(--text);
    transform: rotateY(180deg);
    font-size: 13px;
    text-align: left;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 20px;
  }

  .card-item-back .card-back-info {
      margin-bottom: 5px;
      font-weight: 700;
  }
  .card-item-back .card-back-note {
      font-style: italic;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin-top: 10px;
      flex-grow: 1; /* Allow note to take up space */
  }
  .card-item-back .card-back-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: auto; /* Push to bottom */
      width: 100%;
      text-align: right;
  }

  .card-item-front img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
      border-radius: 8px; /* Slightly rounded images */
  }

  .card-item.grayscale .card-item-front img {
      filter: grayscale(100%);
  }
  .card-item.grayscale .card-item-front .card-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(255, 255, 255, 0.7); /* Light overlay */
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;
      font-weight: bold;
      color: var(--muted);
  }
  .card-item-front .card-type {
    position: absolute;
    top: 10px;
    left: 10px;
  }

  /* ── GIVE CARD FORM ── */
  .give-card-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 560px;
  }
  .card-type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .card-type-btn {
    padding: 10px; /* Adjusted padding for images */
    border-radius: 12px; border: 2px solid var(--border);
    background: var(--surface2); cursor: pointer; text-align: center; /* Centered for images */
    transition: all 0.2s; color: var(--text);
    height: 120px; /* Fixed height for image buttons */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .card-type-btn img {
    max-width: 80%;
    max-height: 80px; /* Max height for images within buttons */
    object-fit: contain;
    margin-bottom: 5px;
  }
  .card-type-btn .ct-icon { display: none; } /* Hide emoji icon when image is present */
  .card-type-btn .ct-label { font-size: 12px; font-weight: 700; display: block; line-height: 1.2; }
  .card-type-btn.selected { border-color: var(--accent) !important; background: rgba(15,44,97,0.08) !important; }
  /* Specific selected styles, apply to general selected */
  .card-type-btn.selected.pioneer { border-color: var(--accent); background: rgba(15,44,97,0.08); }
  .card-type-btn.selected.purposeful { border-color: var(--accent2); background: rgba(255,81,161,0.08); }
  .card-type-btn.selected.excellence { border-color: var(--accent3); background: rgba(0,208,218,0.08); }
  .card-type-btn.selected.reliable { border-color: #059669; background: rgba(5,150,105,0.08); }
  .card-type-btn.selected.sustainable { border-color: #ea580c; background: rgba(234,88,12,0.08); }
  
  .card-type-btn:hover { border-color: var(--muted); }
  .success-msg { color: var(--accent3); font-size: 14px; font-weight: 700; padding: 12px 16px; background: rgba(0,208,218,0.1); border-radius: 10px; border: 1px solid rgba(0,208,218,0.2); margin-top: 16px; display: none; }

  /* ── MY CARDS ── */
  .tabs-inner { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab-btn { padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--muted); background: var(--surface); border: 1px solid var(--border); transition: all 0.2s; }
  .tab-btn.active { 
    color: var(--accent); 
    border-color: rgba(15,44,97,0.3); 
    background: rgba(15,44,97,0.06); 
  }

  /* ── ADMIN ── */
  .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media(max-width: 700px) { .admin-grid { grid-template-columns: 1fr; } }
  .admin-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .admin-panel h3 { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .user-list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .user-list-item:last-child { border-bottom: none; }
  .user-list-item .uname { flex: 1; font-size: 14px; font-weight: 700; }
  .user-list-item .urole { font-size: 11px; color: var(--muted); font-weight: 400; }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
  .badge.admin { background: rgba(15,44,97,0.1); color: var(--accent); }
  .badge.user { background: var(--surface2); color: var(--muted); }
  .card-type-list-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .card-type-list-item:last-child { border-bottom: none; }
  .card-type-list-item .ct-name { flex: 1; font-size: 14px; font-weight: 700; }

  /* Gold Card Behaviors List Specific Styles */
  .gold-card-team-group { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
  .gold-card-team-group:last-of-type { margin-bottom: 0; }
  .gold-card-team-group h4 { font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 10px; color: var(--accent); }
  .gold-card-value-group { margin-bottom: 10px; padding-left: 10px; border-left: 2px solid var(--border); }
  .gold-card-value-group:last-of-type { margin-bottom: 0; }
  .gold-card-value-group h5 { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .gold-card-value-group ul { list-style: none; padding-left: 0; }
  .gold-card-value-group li { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 8px 0; border-bottom: 1px dotted var(--border); font-size: 13px; 
    font-weight: 500;
  }
  .gold-card-value-group li:last-child { border-bottom: none; }
  .gold-card-value-group li .gold-icon { margin-right: 8px; font-size: 16px; }


  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; font-weight: 500; }

  /* ── ALERT ── */
  .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; margin-bottom: 16px; display: none; }
  .alert.error { background: rgba(224,80,96,0.1); border: 1px solid rgba(224,80,96,0.2); color: #e07080; }
  .alert.success { background: rgba(0,208,218,0.1); border: 1px solid rgba(0,208,218,0.2); color: var(--accent3); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media(max-width: 600px) {
    .topnav { padding: 0 16px; }
    .main { padding: 16px; }
    .nav-tabs { display: none; }
    .give-card-box { padding: 20px; }
    .card-type-grid { grid-template-columns: 1fr; }
    .stats-strip { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <img src="ibl-energy-logo.png" alt="IBL Energy Logo" class="ibl-energy-main-logo">
    <div class="auth-logo">Behaviours <span>on Display</span></div>
    <div class="auth-sub">Recognition cards for high-performing teams</div>
    <div class="alert error" id="auth-error"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="text" id="login-username" placeholder="e.g. delphine.laguette@ibl-energy.com" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In →</button>
    <p style="margin-top:20px; font-size:12px; color:var(--muted); text-align:center;">
      Please login with your official IBL Energy email address.
    </p>
  </div>
</div>

<!-- ══════════════════════════════════════════
     APP
══════════════════════════════════════════ -->
<div id="app">
  <!-- TOP NAV -->
  <nav class="topnav">
    <div class="nav-logo">Behaviours <span>on Display</span></div>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="showView('dashboard')">Dashboard</div>
      <div class="nav-tab" onclick="showView('give')">Give Card</div>
      <div class="nav-tab" onclick="showView('mycards')">My Cards</div>
      <div class="nav-tab" id="admin-tab" style="display:none" onclick="showView('admin')">Admin</div>
    </div>
    <div class="nav-right">
      <div class="nav-user">
