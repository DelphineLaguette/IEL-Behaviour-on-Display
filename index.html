<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Behaviours on Display - IBL Energy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8; --surface: #ffffff; --border: #d0dae6;
    --accent: #0F2C61; --accent2: #FF51A1; --text: #0F2C61; --muted: #53698c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  
  /* --- LAYOUT --- */
  #app { display: none; min-height: 100vh; flex-direction: column; }
  .topnav { display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .main { flex: 1; padding: 32px; max-width: 1100px; margin: 0 auto; width: 100%; }
  .view { display: none; } .view.active { display: block; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--muted); }
  .nav-tab.active { color: var(--accent); background: rgba(15,44,97,0.08); }

  /* --- CARD FLIP SYSTEM --- */
  .card-container {
    perspective: 1000px;
    width: 240px; height: 340px;
    cursor: pointer;
    margin: 10px auto;
  }
  .card-flip {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.6s; transform-style: preserve-3d;
  }
  .card-container.flipped .card-flip { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 12px;
    overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .card-back { transform: rotateY(180deg); }
  .card-img { width: 100%; height: 100%; object-fit: cover; }
  
  /* --- RECIPIENT OVERLAY & GRAYSCALE --- */
  .card-container.given .card-img { filter: grayscale(100%); opacity: 0.7; }
  .recipient-tag {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; padding: 4px 12px;
    border-radius: 20px; font-size: 11px; font-weight: 700; z-index: 10;
  }

  /* --- ADMIN PANELS --- */
  .admin-panel { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
  .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; }
  .btn-primary { background: var(--accent); color: white; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; }
  input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }

  /* --- GRID --- */
  .cards-display-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
  .value-selector { display: flex; gap: 10px; margin-bottom: 20px; }
  .value-btn { padding: 15px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; flex: 1; text-align: center; background: white; }
  .value-btn.active { border-color: var(--accent2); background: #fff5f8; }
</style>
</head>
<body>

<div id="auth-screen" style="padding: 50px; text-align: center;">
  <h2>Behaviours on Display</h2>
  <button class="btn btn-primary" onclick="doLogin()">Enter App</button>
</div>

<div id="app">
  <nav class="topnav">
    <div class="nav-logo">IBL Energy</div>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="showView('give')">Give Card</div>
      <div class="nav-tab" onclick="showView('admin')">Admin</div>
    </div>
  </nav>

  <div class="main">
    <div class="view active" id="view-give">
      <h2>Select a Core Value</h2>
      <div class="value-selector" id="value-selector">
        <button class="value-btn" onclick="selectValue('Pioneer')">🚀 Pioneer</button>
        <button class="value-btn" onclick="selectValue('Purposeful')">🎯 Purposeful</button>
        <button class="value-btn" onclick="selectValue('Excellence')">⭐ Excellence</button>
        <button class="value-btn" onclick="selectValue('Reliable')">✅ Reliable</button>
        <button class="value-btn" onclick="selectValue('Sustainable')">🌍 Sustainable</button>
      </div>

      <div id="cards-display-section" style="display:none;">
        <h3 id="selected-value-title">Cards</h3>
        <div class="form-group" style="max-width: 300px;">
          <label>Select Recipient</label>
          <select id="recipient-select"></select>
        </div>
        <div class="cards-display-grid" id="cards-grid"></div>
      </div>
    </div>

    <div class="view" id="view-admin">
      <div class="admin-panel">
        <h3>Add New Card Template</h3>
        <div class="form-group">
          <label>Core Value</label>
          <select id="admin-value-select">
            <option>Pioneer</option><option>Purposeful</option><option>Excellence</option><option>Reliable</option><option>Sustainable</option>
          </select>
        </div>
        <div class="form-group">
          <label>Recto (Front PNG)</label>
          <input type="file" id="recto-file" accept="image/png">
        </div>
        <div class="form-group">
          <label>Verso (Back PNG)</label>
          <input type="file" id="verso-file" accept="image/png">
        </div>
        <button class="btn btn-primary" onclick="uploadCard()">Save Card Template</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- DATA HANDLING ---
let cards = JSON.parse(localStorage.getItem('ibl_cards')) || [];
let givenCards = JSON.parse(localStorage.getItem('ibl_given')) || [];
const users = ["Pierre", "Aarti", "Alvin", "Joshua", "Delphine"];

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  if(id === 'give') renderRecipientSelect();
}

function doLogin() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

// --- ADMIN: STOCKING IMAGES ---
function uploadCard() {
  const value = document.getElementById('admin-value-select').value;
  const recto = document.getElementById('recto-file').files[0];
  const verso = document.getElementById('verso-file').files[0];

  if(!recto || !verso) return alert("Please select both PNG files");

  const readerR = new FileReader();
  readerR.onload = function(e) {
    const rectoData = e.target.result;
    const readerV = new FileReader();
    readerV.onload = function(e2) {
      const versoData = e2.target.result;
      cards.push({ id: Date.now(), value, recto: rectoData, verso: versoData });
      localStorage.setItem('ibl_cards', JSON.stringify(cards));
      alert("Card Added!");
    };
    readerV.readAsDataURL(verso);
  };
  readerR.readAsDataURL(recto);
}

// --- DISPLAY & GIVE CARDS ---
function selectValue(val) {
  document.getElementById('cards-display-section').style.display = 'block';
  document.getElementById('selected-value-title').innerText = val + " Cards";
  renderCards(val);
}

function renderCards(filterValue) {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  
  const filtered = cards.filter(c => c.value === filterValue);
  
  filtered.forEach(card => {
    const isGiven = givenCards.find(g => g.cardId === card.id);
    const container = document.createElement('div');
    container.className = `card-container ${isGiven ? 'given' : ''}`;
    container.onclick = () => {
      if(!isGiven) {
        giveThisCard(card.id);
      } else {
        container.classList.toggle('flipped');
      }
    };

    container.innerHTML = `
      <div class="card-flip">
        <div class="card-front">
          ${isGiven ? `<div class="recipient-tag">To: ${isGiven.to}</div>` : ''}
          <img src="${card.recto}" class="card-img">
        </div>
        <div class="card-back">
          <img src="${card.verso}" class="card-img">
        </div>
      </div>
    `;
    grid.appendChild(container);
  });
}

function renderRecipientSelect() {
  const sel = document.getElementById('recipient-select');
  sel.innerHTML = users.map(u => `<option>${u}</option>`).join('');
}

function giveThisCard(cardId) {
  const recipient = document.getElementById('recipient-select').value;
  if(confirm(`Give this card to ${recipient}?`)) {
    givenCards.push({ cardId, to: recipient });
    localStorage.setItem('ibl_given', JSON.stringify(givenCards));
    renderCards(cards.find(c => c.id === cardId).value);
  }
}

// Initial state
renderRecipientSelect();
</script>
</body>
</html>
